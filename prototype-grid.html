<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Map — Grid Prototype</title>
<style>
  :root {
    --bg:        #090909;
    --surface:   #0E0E0E;
    --surface2:  #141414;
    --yellow:    #FFE81A;
    --yellow-dim:#7A6F00;
    --yellow-bg: rgba(255,232,26,0.06);
    --yellow-sel:rgba(255,232,26,0.12);
    --cyan:      #00C8C8;
    --cyan-dim:  #005F5F;
    --cyan-06:   rgba(0,200,200,0.06);
    --cyan-16:   rgba(0,200,200,0.16);
    --cyan-28:   rgba(0,200,200,0.28);
    --green:     #00CC44;
    --white:     #DDD8C4;
    --muted:     #555550;
    --border:    #222220;
    --mono:      'Courier New', 'Courier', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--mono);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .app-title {
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--yellow);
    text-transform: uppercase;
  }

  .coord-readout {
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--cyan);
    text-transform: uppercase;
    transition: opacity 80ms;
  }
  .coord-readout.hidden { opacity: 0; pointer-events: none; }

  /* ── LAYOUT ─────────────────────────────────── */
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── GRID AREA ──────────────────────────────── */
  .grid-area {
    flex: 1;
    overflow: auto;
    padding: 16px;
    display: flex;
    align-items: flex-start;
  }

  .grid-container {
    display: inline-flex;
    flex-direction: column;
    user-select: none;
  }

  .col-header-row {
    display: flex;
    margin-left: 26px;
  }

  .col-label {
    width: 28px;
    height: 18px;
    font-size: 8px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: color 80ms;
  }
  .col-label.axis-hover    { color: var(--green); }
  .col-label.axis-selected { color: var(--yellow); }

  .grid-row {
    display: flex;
    align-items: center;
  }

  .row-label {
    width: 26px;
    height: 24px;
    font-size: 8px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 5px;
    flex-shrink: 0;
    transition: color 80ms;
  }
  .row-label.axis-hover    { color: var(--green); }
  .row-label.axis-selected { color: var(--yellow); }

  /* ── CELLS ──────────────────────────────────── */
  .cell {
    width: 28px;
    height: 24px;
    border: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: border-color 80ms, background 80ms;
  }

  /* hover: green flash — !important to override all state borders */
  .cell:hover { border-color: var(--green) !important; }

  .cell.sparse     { border-color: var(--cyan-dim); background: var(--cyan-06); }
  .cell.dense      { border-color: var(--cyan);     background: var(--cyan-16); }
  .cell.core       { border-color: var(--cyan);     background: var(--cyan-28); }
  .cell.user-added { border: 1px dashed var(--yellow-dim); background: rgba(255,232,26,0.04); }
  .cell.selected   { border: 2px solid var(--yellow) !important; background: var(--yellow-sel) !important; z-index: 10; }

  /* density dot */
  .cell-dot {
    position: absolute;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--cyan);
    pointer-events: none;
  }
  .cell.user-added .cell-dot  { background: var(--yellow); }
  .cell.selected   .cell-dot  { background: var(--yellow); }

  /* corner tick marks — 4 child divs injected via JS */
  .tick {
    position: absolute;
    width: 5px;
    height: 5px;
    border-color: var(--yellow);
    border-style: solid;
    pointer-events: none;
    z-index: 11;
  }
  .tick.tl { top: -3px;    left: -3px;  border-width: 2px 0 0 2px; }
  .tick.tr { top: -3px;    right: -3px; border-width: 2px 2px 0 0; }
  .tick.bl { bottom: -3px; left: -3px;  border-width: 0 0 2px 2px; }
  .tick.br { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

  /* ── PANEL ──────────────────────────────────── */
  .panel {
    width: 290px;
    flex-shrink: 0;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }

  .panel-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .panel-grid-ref {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--yellow);
    text-transform: uppercase;
  }

  .panel-count {
    font-size: 9px;
    letter-spacing: 0.10em;
    color: var(--cyan);
    text-transform: uppercase;
  }

  /* system list */
  .system-list {
    flex: 1;
    overflow-y: auto;
  }

  .system-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 100ms;
  }
  .system-row:hover { background: var(--surface2); }
  .system-row.active {
    border-left: 2px solid var(--yellow);
    background: var(--yellow-bg);
    padding-left: 12px;
  }

  .system-info  { flex: 1; min-width: 0; }

  .sys-name {
    font-size: 10px;
    letter-spacing: 0.04em;
    color: var(--white);
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sys-meta {
    font-size: 8px;
    letter-spacing: 0.10em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .badge {
    font-size: 7px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 4px;
    flex-shrink: 0;
    align-self: center;
  }
  .badge-canon { color: var(--cyan);   border: 1px solid var(--cyan-dim);   background: var(--cyan-06); }
  .badge-added { color: var(--yellow); border: 1px solid var(--yellow-dim); background: var(--yellow-bg); }

  /* empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
  }

  .empty-title {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .empty-sub {
    font-size: 8px;
    letter-spacing: 0.10em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0.55;
  }

  /* no-selection prompt */
  .no-selection {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 30px;
    opacity: 0.35;
  }
  .no-sel-text {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: center;
    line-height: 2.2;
  }

  /* panel footer */
  .panel-footer {
    border-top: 1px solid var(--border);
    padding: 10px 14px;
    flex-shrink: 0;
  }

  .btn-place {
    width: 100%;
    padding: 7px 10px;
    background: var(--yellow-bg);
    border: 1px solid var(--yellow-dim);
    color: var(--yellow);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 100ms, border-color 100ms;
  }
  .btn-place:hover { background: rgba(255,232,26,0.14); border-color: var(--yellow); }
  .btn-place:disabled { opacity: 0.28; cursor: default; }
  .btn-place:disabled:hover { background: var(--yellow-bg); border-color: var(--yellow-dim); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <span class="app-title">Star Wars Galaxy Map</span>
  <span class="coord-readout hidden" id="coord-readout">—</span>
</header>

<div class="layout">
  <div class="grid-area">
    <div class="grid-container" id="grid-container"></div>
  </div>
  <div class="panel" id="panel"></div>
</div>

<script>
  /* ── DATA ─────────────────────────────────────────── */
  const COLS = 'CDEFGHIJKLMNOPQRSTUV'.split('');
  const ROWS = Array.from({ length: 21 }, (_, i) => i + 1);

  // Deterministic pseudo-random in [0, 1)
  function rand(a, b) {
    return Math.abs(Math.sin(a * 127.1 + b * 311.7) * 43758.5453) % 1;
  }

  // Simulate galaxy density: high near the core (col L = idx 9, row 9 = idx 8)
  function cellCount(ci, ri) {
    const dc = (ci - 9) * 0.75;
    const dr = (ri - 8) * 0.90;
    const dist = Math.sqrt(dc * dc + dr * dr);
    const noise = rand(ci, ri) * 5 - 2.5;
    return Math.max(0, Math.round(15 - dist * 2.0 + noise));
  }

  // Cells with at least one user-added system
  const USER_CELLS = new Set(['J-8', 'N-11', 'P-14']);

  function cellClass(count, col, row) {
    if (USER_CELLS.has(`${col}-${row}`)) return 'user-added';
    if (count === 0)  return '';
    if (count <= 3)   return 'sparse';
    if (count <= 12)  return 'dense';
    return 'core';
  }

  // Fake system names
  const NAMES = [
    'CORUSCANT','TATOOINE','ALDERAAN','NABOO','HOTH','DAGOBAH','BESPIN',
    'ENDOR','MUSTAFAR','GEONOSIS','KAMINO','KASHYYYK','MANDALORE','CORELLIA',
    'MON CALA','SULLUST','RYLOTH','RODIA','MYGEETO','FELUCIA','UTAPAU',
    'SCARIF','JEDHA','EADU','CHRISTOPHSIS','MALASTARE','DATHOMIR','UMBARA',
    'LOTHAL','OSSUS','DANTOOINE','BILBRINGI','DORIN','AAETON','DEVSHI',
    'BYBLOS','THYFERRA','FONDOR','KUAT','CHANDRILA','TAKODANA','CANTONICA',
    'CRAIT','PASAANA','KIJIMI','AHCH-TO','ILUM','ONDERON','CORULAG','ANAXES',
    'ERIADU','BOTHAWUI','DURO','IRIDONIA','CHAMPALA','ALZOC III','MERSON',
    'AGAMAR','ALEEN','AMBRIA','ANZAT','ARDA-2','BAROONDA','CATO NEIMOIDIA',
    'CHALACTA','CLAK\'DOR VII','COLUMEX','CORFAI','DAC','DAALANG','DRUCKENWELL',
  ];

  const REGIONS = [
    'DEEP CORE','CORE WORLDS','CORE WORLDS','COLONIES','INNER RIM',
    'EXPANSION REGION','MID RIM','OUTER RIM TERRITORIES','OUTER RIM TERRITORIES',
    'WILD SPACE','UNKNOWN REGIONS',
  ];

  const SECTORS = [
    'ARKANIS SECTOR','RAIOBALLO SECTOR','CHOMMEL SECTOR','CORELLIA SECTOR',
    'DULUUR SECTOR','GORDIAN REACH','HAPES CLUSTER','IBAAR SECTOR',
    'JAVIN SECTOR','LAHARA SECTOR','MYTARANOR SECTOR','QUELII SECTOR',
    null, null, null,
  ];

  function systemsForCell(ci, ri, count) {
    const results = [];
    const used = new Set();
    const isUserCell = USER_CELLS.has(`${COLS[ci]}-${ROWS[ri]}`);

    for (let i = 0; i < count && results.length < NAMES.length; i++) {
      let ni = Math.floor(rand(ci * 3 + i * 7, ri * 7 + i * 3) * NAMES.length);
      let attempts = 0;
      while (used.has(ni) && attempts++ < NAMES.length) ni = (ni + 1) % NAMES.length;
      if (used.has(ni)) continue;
      used.add(ni);

      const regionIdx = Math.floor(rand(ci + i * 13, ri + i * 17) * REGIONS.length);
      const sectorIdx = Math.floor(rand(ci + i * 19, ri + i * 11) * SECTORS.length);
      const isUserAdded = isUserCell && i === count - 1; // last entry is user-added

      results.push({
        name: NAMES[ni],
        region: REGIONS[regionIdx],
        sector: SECTORS[sectorIdx],
        isUserAdded,
      });
    }

    // User cell with zero canon systems still gets one user entry
    if (isUserCell && count === 0) {
      results.push({
        name: 'UNNAMED OUTPOST',
        region: REGIONS[Math.floor(rand(ci, ri) * REGIONS.length)],
        sector: null,
        isUserAdded: true,
      });
    }

    // Sort: canon first, then alpha within each group
    results.sort((a, b) => {
      if (a.isUserAdded !== b.isUserAdded) return a.isUserAdded ? 1 : -1;
      return a.name.localeCompare(b.name);
    });

    return results;
  }

  /* ── STATE ────────────────────────────────────────── */
  let selCI = null, selRI = null;
  let hovCI = null, hovRI = null;

  /* ── BUILD GRID ──────────────────────────────────── */
  const container = document.getElementById('grid-container');
  const colLabels = [];
  const rowLabels = [];
  // cells[ri][ci]
  const cells = ROWS.map(() => new Array(COLS.length));

  // Column header row
  const colHeaderRow = document.createElement('div');
  colHeaderRow.className = 'col-header-row';
  COLS.forEach((col, ci) => {
    const el = document.createElement('div');
    el.className = 'col-label';
    el.textContent = col;
    colHeaderRow.appendChild(el);
    colLabels.push(el);
  });
  container.appendChild(colHeaderRow);

  // Data rows
  ROWS.forEach((row, ri) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'grid-row';

    const rowLabel = document.createElement('div');
    rowLabel.className = 'row-label';
    rowLabel.textContent = String(row).padStart(2, '0');
    rowEl.appendChild(rowLabel);
    rowLabels.push(rowLabel);

    COLS.forEach((col, ci) => {
      const count  = cellCount(ci, ri);
      const cls    = cellClass(count, col, row);
      const isUser = USER_CELLS.has(`${col}-${row}`);

      const cell = document.createElement('div');
      cell.className = 'cell' + (cls ? ` ${cls}` : '');
      cell.dataset.ci    = ci;
      cell.dataset.ri    = ri;
      cell.dataset.count = count;

      if (count > 0 || isUser) {
        const dot = document.createElement('div');
        dot.className = 'cell-dot';
        cell.appendChild(dot);
      }

      cell.addEventListener('mouseenter', () => onHover(ci, ri));
      cell.addEventListener('mouseleave', onLeave);
      cell.addEventListener('click',      () => onClick(ci, ri));

      rowEl.appendChild(cell);
      cells[ri][ci] = cell;
    });

    container.appendChild(rowEl);
  });

  /* ── INTERACTION ─────────────────────────────────── */
  function onHover(ci, ri) {
    hovCI = ci; hovRI = ri;
    refreshAxis();
    const readout = document.getElementById('coord-readout');
    readout.textContent = `${COLS[ci]}-${String(ROWS[ri]).padStart(2, '0')}`;
    readout.classList.remove('hidden');
  }

  function onLeave() {
    hovCI = null; hovRI = null;
    refreshAxis();
    const readout = document.getElementById('coord-readout');
    if (selCI === null) {
      readout.classList.add('hidden');
    } else {
      readout.textContent = `${COLS[selCI]}-${String(ROWS[selRI]).padStart(2, '0')}`;
    }
  }

  function onClick(ci, ri) {
    // Deselect previous
    if (selCI !== null) {
      const prev = cells[selRI][selCI];
      prev.querySelectorAll('.tick').forEach(t => t.remove());
      const prevCount = parseInt(prev.dataset.count);
      const prevCol   = COLS[selCI];
      const prevRow   = ROWS[selRI];
      const prevCls   = cellClass(prevCount, prevCol, prevRow);
      prev.className  = 'cell' + (prevCls ? ` ${prevCls}` : '');
      // restore dot if needed
      if (!prev.querySelector('.cell-dot') && (prevCount > 0 || USER_CELLS.has(`${prevCol}-${prevRow}`))) {
        const dot = document.createElement('div');
        dot.className = 'cell-dot';
        prev.insertBefore(dot, prev.firstChild);
      }
    }

    selCI = ci; selRI = ri;

    const cell = cells[ri][ci];
    cell.classList.add('selected');

    // Corner tick marks
    ['tl', 'tr', 'bl', 'br'].forEach(pos => {
      const tick = document.createElement('div');
      tick.className = `tick ${pos}`;
      cell.appendChild(tick);
    });

    refreshAxis();
    renderPanel();

    const readout = document.getElementById('coord-readout');
    readout.textContent = `${COLS[ci]}-${String(ROWS[ri]).padStart(2, '0')}`;
    readout.classList.remove('hidden');
  }

  function refreshAxis() {
    colLabels.forEach((el, ci) => {
      el.className = 'col-label';
      if      (ci === selCI) el.classList.add('axis-selected');
      else if (ci === hovCI) el.classList.add('axis-hover');
    });
    rowLabels.forEach((el, ri) => {
      el.className = 'row-label';
      if      (ri === selRI) el.classList.add('axis-selected');
      else if (ri === hovRI) el.classList.add('axis-hover');
    });
  }

  /* ── PANEL ───────────────────────────────────────── */
  function renderPanel() {
    const panel = document.getElementById('panel');

    if (selCI === null) {
      panel.innerHTML = `
        <div class="no-selection">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="13" stroke="#555550" stroke-width="1"/>
            <circle cx="18" cy="18" r="6"  stroke="#555550" stroke-width="1"/>
            <line x1="5"  y1="18" x2="31" y2="18" stroke="#555550" stroke-width="1" stroke-dasharray="2 3"/>
            <line x1="18" y1="5"  x2="18" y2="31" stroke="#555550" stroke-width="1" stroke-dasharray="2 3"/>
          </svg>
          <div class="no-sel-text">SELECT A GRID SQUARE<br>TO VIEW SYSTEMS</div>
        </div>
        <div class="panel-footer">
          <button class="btn-place" disabled>PLACE SYSTEM</button>
        </div>`;
      return;
    }

    const col     = COLS[selCI];
    const row     = ROWS[selRI];
    const count   = cellCount(selCI, selRI);
    const systems = systemsForCell(selCI, selRI, count);
    const total   = systems.length;

    let html = `
      <div class="panel-header">
        <span class="panel-grid-ref">GRID SQUARE ${col}-${String(row).padStart(2, '0')}</span>
        <span class="panel-count">${total} ${total === 1 ? 'SYSTEM' : 'SYSTEMS'}</span>
      </div>`;

    if (total === 0) {
      html += `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="opacity:.22">
            <circle cx="20" cy="20" r="15" stroke="#555550" stroke-width="1"/>
            <circle cx="20" cy="20" r="7"  stroke="#555550" stroke-width="1"/>
            <line x1="5"  y1="20" x2="35" y2="20" stroke="#555550" stroke-width="1" stroke-dasharray="2 3"/>
            <line x1="20" y1="5"  x2="20" y2="35" stroke="#555550" stroke-width="1" stroke-dasharray="2 3"/>
          </svg>
          <div class="empty-title">NO SYSTEMS CHARTED</div>
          <div class="empty-sub">ADD ONE BELOW</div>
        </div>`;
    } else {
      html += '<div class="system-list">';
      systems.forEach((sys, idx) => {
        const meta   = sys.sector ? `${sys.sector} · ${sys.region}` : sys.region;
        const badge  = sys.isUserAdded
          ? '<span class="badge badge-added">ADDED</span>'
          : '<span class="badge badge-canon">CANON</span>';
        const active = idx === 0 ? ' active' : '';
        html += `
          <div class="system-row${active}" onclick="setActive(this)">
            <div class="system-info">
              <div class="sys-name">${sys.name}</div>
              <div class="sys-meta">${meta}</div>
            </div>
            ${badge}
          </div>`;
      });
      html += '</div>';
    }

    html += `
      <div class="panel-footer">
        <button class="btn-place">PLACE SYSTEM</button>
      </div>`;

    panel.innerHTML = html;
  }

  window.setActive = function(row) {
    document.querySelectorAll('.system-row').forEach(r => r.classList.remove('active'));
    row.classList.add('active');
  };

  /* ── INIT ────────────────────────────────────────── */
  renderPanel();

  // Pre-select the Coruscant-area cell (L-9) so the panel is populated on load
  onClick(9, 8);
</script>
</body>
</html>
